# gres.conf for host "carbonio"  ->  /etc/slurm/gres.conf
# 1x NVIDIA GeForce GTX 1080 Ti. Device declared MANUALLY (no AutoDetect=nvml)
# to avoid the NVML/rsmi init crash seen on this box.
#
# Confirm the device node matches `ls -l /dev/nvidia*` (expect /dev/nvidia0).

# --- Physical GPU ---
Name=gpu File=/dev/nvidia0

# --- MPS (compute-percentage sharing) ---
# Count is the total for the node: 100 = 100% of the single GPU.
Name=mps Count=100
