# slurm.conf for host "mochi"
# 40 CPUs, 60 GB RAM, 2x NVIDIA Quadro RTX 6000 (24 GB each)
# GPU sharing via gres/shard (reliably spans BOTH GPUs, unlike gres/mps).
# Put this file (identical) on every node of the cluster: /etc/slurm/slurm.conf

ControlMachine=mochi
#ControlAddr=

MpiDefault=none
ProctrackType=proctrack/cgroup
ReturnToService=1

SlurmctldPidFile=/run/slurmctld.pid
#SlurmctldPort=6817
SlurmdPidFile=/run/slurmd.pid
#SlurmdPort=6818

SlurmdSpoolDir=/var/lib/slurm-llnl/slurmd
SlurmUser=slurm
#SlurmdUser=root
StateSaveLocation=/var/lib/slurm-llnl/slurmctld
SwitchType=switch/none

TaskPlugin=task/cgroup

#
# TIMERS
#KillWait=30
#MinJobAge=300
#SlurmctldTimeout=120
#SlurmdTimeout=300

#
# SCHEDULING
SchedulerType=sched/builtin
SelectType=select/cons_tres
SelectTypeParameters=CR_Core_Memory

#
# GENERIC RESOURCES (GPUs + shard)
# shard splits each GPU into slices; a job requests --gres=shard:1.
# 12 shards per card x 2 cards = 24 slices total, balanced across both GPUs.
GresTypes=gpu,shard

#
# LOGGING AND ACCOUNTING
AccountingStorageType=accounting_storage/none
ClusterName=mochi
JobAcctGatherType=jobacct_gather/cgroup
#SlurmctldDebug=info
SlurmctldLogFile=/var/log/slurm-llnl/slurmctld.log
#SlurmdDebug=info
SlurmdLogFile=/var/log/slurm-llnl/slurmd.log

#
# COMPUTE NODES
NodeName=mochi CPUs=40 Boards=1 SocketsPerBoard=1 CoresPerSocket=20 ThreadsPerCore=2 RealMemory=60000 Gres=gpu:2,shard:24 State=UNKNOWN

PartitionName=long Nodes=mochi Default=YES MaxTime=INFINITE State=UP
