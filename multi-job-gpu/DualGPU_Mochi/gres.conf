# gres.conf for host "mochi"  ->  /etc/slurm/gres.conf
# 2x NVIDIA Quadro RTX 6000. GPU sharing via gres/shard.
# Devices declared MANUALLY (no AutoDetect=nvml) to avoid the NVML/rsmi crash.
#
# Confirm device nodes with `ls -l /dev/nvidia*` (17:00.0 -> nvidia0,
# B3:00.0 -> nvidia1 per nvidia-smi).

# --- Physical GPUs ---
# Type omitted to match the untyped "Gres=gpu:2" in slurm.conf.
Name=gpu File=/dev/nvidia0
Name=gpu File=/dev/nvidia1

# --- Shards, BOUND PER GPU ---
# Each shard line references a specific GPU via File=. 12 per card = 24 total.
# Because each GPU's shards are a separate consumable resource, cons_tres will
# allocate from BOTH cards (fills nvidia0, then spills to nvidia1) instead of
# stalling the way gres/mps did.
Name=shard Count=12 File=/dev/nvidia0
Name=shard Count=12 File=/dev/nvidia1
