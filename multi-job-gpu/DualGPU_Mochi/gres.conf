# gres.conf for host "mochi"  ->  /etc/slurm/gres.conf
# 2x NVIDIA Quadro RTX 6000. Devices declared MANUALLY (no AutoDetect=nvml)
# to avoid the NVML/rsmi init crash pattern seen on the other boxes.
#
# Confirm the device node numbers match `ls -l /dev/nvidia*` and the PCI bus
# ordering from `nvidia-smi` (17:00.0 -> nvidia0, B3:00.0 -> nvidia1).

# --- Physical GPUs ---
# Type intentionally omitted so it matches the untyped "Gres=gpu:2" in
# slurm.conf (avoids the "N more configured than expected" warning).
Name=gpu File=/dev/nvidia0
Name=gpu File=/dev/nvidia1

# --- MPS (compute-percentage sharing), BOUND PER GPU ---
# CRITICAL for multi-GPU nodes: each MPS line must reference a specific GPU
# via File=, or SLURM ties the whole count to the first GPU only (jobs pile
# onto nvidia0 while nvidia1 sits idle). 100 units per card = 200 total.
Name=mps Count=100 File=/dev/nvidia0
Name=mps Count=100 File=/dev/nvidia1
