# gres.conf for host "mochi"  ->  /etc/slurm/gres.conf
# 2x NVIDIA Quadro RTX 6000. Devices declared MANUALLY (no AutoDetect=nvml)
# to avoid the NVML/rsmi init crash you hit earlier.
#
# Confirm the device node numbers match `ls -l /dev/nvidia*` and the PCI bus
# ordering from `nvidia-smi` (17:00.0 -> nvidia0, B3:00.0 -> nvidia1 in your output).

# --- Physical GPUs ---
Name=gpu Type=rtx6000 File=/dev/nvidia0
Name=gpu Type=rtx6000 File=/dev/nvidia1

# --- MPS (compute-percentage sharing) ---
# Count is the TOTAL across all GPUs on this node: 100 per GPU x 2 = 200.
Name=mps Count=200
