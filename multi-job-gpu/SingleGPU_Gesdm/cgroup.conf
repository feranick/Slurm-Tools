# cgroup.conf for host "GridEdgeDM" (gesdm)  ->  /etc/slurm/cgroup.conf
# Required by TaskPlugin=task/cgroup and ProctrackType=proctrack/cgroup.
# Confines each job to its requested cores/memory and to its assigned GPU.
# Remove this file (and set TaskPlugin=task/none) if you prefer no enforcement.

ConstrainCores=yes
ConstrainRAMSpace=yes
ConstrainDevices=yes
#ConstrainSwapSpace=yes
