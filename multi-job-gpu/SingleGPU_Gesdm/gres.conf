# gres.conf for host "GridEdgeDM" (gesdm)  ->  /etc/slurm/gres.conf
# 1x NVIDIA GeForce RTX 3050. Device declared MANUALLY (no AutoDetect=nvml)
# to avoid the NVML/rsmi init crash pattern seen on the other boxes.
#
# Confirm the device node matches `ls -l /dev/nvidia*` (expect /dev/nvidia0).

# --- Physical GPU ---
Name=gpu File=/dev/nvidia0

# --- MPS (compute-percentage sharing) ---
# Count is the total for the node: 100 = 100% of the single GPU.
Name=mps Count=100
