# slurm.conf for host "GridEdgeDM" (gesdm)
# 8 CPUs, ~22 GB RAM, 1x NVIDIA GeForce RTX 3050 (Ampere)
# GPU sharing enabled via NVIDIA MPS.
# Put this file (identical) on every node: /etc/slurm/slurm.conf
# See the slurm.conf(5) man page for details.

ControlMachine=GridEdgeDM
#ControlAddr=

MpiDefault=none
ProctrackType=proctrack/cgroup
ReturnToService=1

SlurmctldPidFile=/run/slurmctld.pid
#SlurmctldPort=6817
SlurmdPidFile=/run/slurmd.pid
#SlurmdPort=6818

SlurmdSpoolDir=/var/lib/slurm-llnl/slurmd
SlurmUser=slurm
#SlurmdUser=root
StateSaveLocation=/var/lib/slurm-llnl/slurmctld
SwitchType=switch/none

# task/cgroup gives real core/memory/GPU confinement once a node is shared.
# Requires the accompanying cgroup.conf. Use TaskPlugin=task/none for no enforcement.
TaskPlugin=task/cgroup

#
# TIMERS
#KillWait=30
#MinJobAge=300
#SlurmctldTimeout=120
#SlurmdTimeout=300

#
# SCHEDULING
SchedulerType=sched/builtin
# cons_tres is REQUIRED to subdivide the node (per-core, per-GPU, MPS).
# select/linear would give the whole node to one job.
SelectType=select/cons_tres
SelectTypeParameters=CR_Core_Memory

#
# GENERIC RESOURCES (GPU + MPS)
GresTypes=gpu,mps

#
# LOGGING AND ACCOUNTING
AccountingStorageType=accounting_storage/none
ClusterName=GridEdgeDM
JobAcctGatherType=jobacct_gather/cgroup
#SlurmctldDebug=info
SlurmctldLogFile=/var/log/slurm-llnl/slurmctld.log
#SlurmdDebug=info
SlurmdLogFile=/var/log/slurm-llnl/slurmd.log

#
# COMPUTE NODES
# 1 GPU. mps:100 = 100 "percent" of compute for the single RTX 3050.
# A job requesting --gres=mps:12 gets ~12% -> up to ~8 jobs share the card,
# matching the 8 CPUs. Ampere MPS isolates client memory (up to 48 clients).
NodeName=GridEdgeDM CPUs=8 ThreadsPerCore=2 RealMemory=22000 Gres=gpu:1,mps:100 State=UNKNOWN

PartitionName=long Nodes=GridEdgeDM Default=YES MaxTime=INFINITE State=UP
