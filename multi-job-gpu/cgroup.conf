# cgroup.conf for host "mochi"  ->  /etc/slurm/cgroup.conf
# Required by TaskPlugin=task/cgroup and ProctrackType=proctrack/cgroup.
# Confines each job to the cores/memory it requested so shared jobs can't
# starve each other. Remove this file (and set TaskPlugin=task/none) if you
# prefer no enforcement.

ConstrainCores=yes
ConstrainRAMSpace=yes
ConstrainDevices=yes
# Optional: also cap swap. Your box has little swap, so keep RAM constrained.
#ConstrainSwapSpace=yes
