# slurm.conf for host "mochi"
# 40 CPUs, 60 GB RAM, 2x NVIDIA Quadro RTX 6000 (24 GB each)
# GPU sharing enabled via NVIDIA MPS.
# Put this file (identical) on every node of the cluster: /etc/slurm/slurm.conf
# See the slurm.conf(5) man page for details.

ControlMachine=mochi
#ControlAddr=

MpiDefault=none
ProctrackType=proctrack/cgroup
ReturnToService=1

SlurmctldPidFile=/run/slurmctld.pid
#SlurmctldPort=6817
SlurmdPidFile=/run/slurmd.pid
#SlurmdPort=6818

SlurmdSpoolDir=/var/lib/slurm-llnl/slurmd
SlurmUser=slurm
#SlurmdUser=root
StateSaveLocation=/var/lib/slurm-llnl/slurmctld
SwitchType=switch/none

# task/cgroup gives real core/memory confinement (recommended once you share
# a node). Requires the accompanying cgroup.conf. If you prefer no enforcement,
# set TaskPlugin=task/none instead.
TaskPlugin=task/cgroup

#
# TIMERS
#KillWait=30
#MinJobAge=300
#SlurmctldTimeout=120
#SlurmdTimeout=300

#
# SCHEDULING
SchedulerType=sched/builtin
# cons_tres is REQUIRED to subdivide a node (per-core, per-GPU, MPS).
# select/linear would give a whole node to one job.
SelectType=select/cons_tres
SelectTypeParameters=CR_Core_Memory

#
# GENERIC RESOURCES (GPUs + MPS)
GresTypes=gpu,mps

#
# LOGGING AND ACCOUNTING
AccountingStorageType=accounting_storage/none
ClusterName=mochi
JobAcctGatherType=jobacct_gather/cgroup
#SlurmctldDebug=info
SlurmctldLogFile=/var/log/slurm-llnl/slurmctld.log
#SlurmdDebug=info
SlurmdLogFile=/var/log/slurm-llnl/slurmd.log

#
# COMPUTE NODES
# mps:200 = 100 "percent" of compute per GPU x 2 GPUs.
# A job requesting --gres=mps:5 gets 5% of one GPU -> up to 20 jobs per card.
NodeName=mochi CPUs=40 Boards=1 SocketsPerBoard=1 CoresPerSocket=20 ThreadsPerCore=2 RealMemory=60000 Gres=gpu:2,mps:200 State=UNKNOWN

PartitionName=long Nodes=mochi Default=YES MaxTime=INFINITE State=UP
